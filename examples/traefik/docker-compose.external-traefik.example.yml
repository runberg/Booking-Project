# Example Traefik stack that can front multiple projects.
#
# Usage:
#   1. Copy this file somewhere outside of the Booking Project repo (or keep it here for reference).
#   2. Create the directories referenced in the volumes below (particularly `./letsencrypt`).
#   3. Generate an htpasswd entry for the dashboard Basic Auth user (required only if you plan to access it):
#        htpasswd -nB admin
#      and paste the result into the placeholder below.
#   4. Touch `letsencrypt/acme.json` and chmod 600 so Traefik can persist certificates.
#   5. Start the stack: `docker compose up -d`.
#   6. Attach other compose projects (including Booking Project) to the `traefik-proxy` network.

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.traefik.address=:8080
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=<insert-lets-encrypt-email>
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --api.dashboard=true
    ports:
      - "80:80"
      - "443:443"
      # Dashboard is reachable internally at http://traefik:8080.
      # Uncomment the line below only if you need host-level access.
      # - "8080:8080" # dashboard (protect with auth!)
    environment:
      - TZ=<insert-timezone-or-remove>
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
      - ./dynamic:/etc/traefik/dynamic
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`dashboard.example.com`)
      - traefik.http.routers.dashboard.entrypoints=traefik
      - traefik.http.routers.dashboard.service=api@internal
      - traefik.http.routers.dashboard.middlewares=dashboard-auth
      - traefik.http.middlewares.dashboard-auth.basicauth.users=<insert-htpasswd-entry>
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.http-catchall.rule=HostRegexp(`{host:.+}`)
      - traefik.http.routers.http-catchall.entrypoints=web
      - traefik.http.routers.http-catchall.middlewares=redirect-to-https
    networks:
      - traefik-proxy
    restart: unless-stopped

networks:
  traefik-proxy:
    name: traefik-proxy
    external: false


